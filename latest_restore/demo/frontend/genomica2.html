                }
            },
            {
                id: 10,
                title: "Tema 10. IA en Bioinformática",
                desc: "Machine Learning y Deep Learning aplicado",
                icon: "fa-brain",
                controls: [
                    {id: 'model', type: 'select', label: 'Modelo IA', options: ['CNN', 'RNN', 'Autoencoder', 'Transformers']},
                    {id: 'epochs', type: 'range', label: 'Épocas', min: 10, max: 100, val: 50}
                ],
                code: (p) => `
<span class="c-com"># INTELIGENCIA ARTIFICIAL - ${p.model.toUpperCase()}</span>
<span class="c-com># =========================================</span>

<span class="c-kwd">library</span>(keras)
<span class="c-kwd">library</span>(tensorflow)
<span class="c-kwd">library</span>(ggplot2)

<span class="c-com># Configurar parámetros</span>
model_type <- <span class="c-str">"${p.model}"</span>
n_epochs <- <span class="c-num">${p.epochs}

<span class="c-com># Simular datos para entrenamiento</span>
<span class="c-kwd">set.seed</span>(123)
n_samples <- <span class="c-num">1000</span>
n_features <- <span class="c-num">100</span>

<span class="c-com># Datos de entrada (simulación de secuencias o estructuras)</span>
<span class="c-kwd">if</span> (model_type %in% <span class="c-str">c</span>(<span class="c-str">"CNN"</span>, <span class="c-str">"Transformers"</span>)) {
  <span class="c-com># Datos tipo imagen o secuencia (2D/3D)</span>
  x_train <- <span class="c-fn">array</span>(
    <span class="c-fn">runif</span>(n_samples * 32 * 32 * 1),
    dim = <span class="c-fn">c</span>(n_samples, 32, 32, 1)
  )
  input_shape <- <span class="c-str">c</span>(32, 32, 1)
  
} <span class="c-kwd">else if</span> (model_type == <span class="c-str">"RNN"</span>) {
  <span class="c-com># Datos tipo secuencia temporal</span>
  sequence_length <- <span class="c-num">50</span>
  x_train <- <span class="c-fn">array</span>(
    <span class="c-fn">runif</span>(n_samples * sequence_length * n_features),
    dim = <span class="c-fn">c</span>(n_samples, sequence_length, n_features)
  )
  input_shape <- <span class="c-str">c</span>(sequence_length, n_features)
  
} <span class="c-kwd">else</span> {
  <span class="c-com># Autoencoder - datos comprimidos</span>
  x_train <- <span class="c-fn">matrix</span>(
    <span class="c-fn">runif</span>(n_samples * n_features),
    nrow = n_samples, ncol = n_features
  )
}

<span class="c-com># Etiquetas (clasificación binaria: 0 = normal, 1 = patológico)</span>
y_train <- <span class="c-fn">rbinom</span>(n_samples, 1, 0.5)
y_train <- <span class="c-fn">to_categorical</span>(y_train, 2)

<span class="c-com># Construir modelo según tipo</span>
<span class="c-kwd">if</span> (model_type == <span class="c-str">"CNN"</span>) {
  <span class="c-com># Red Neuronal Convolucional</span>
  model <- <span class="c-fn">keras_model_sequential</span>() %>%
    <span class="c-fn">layer_conv_2d</span>(filters=32, kernel_size=<span class="c-str">c</span>(3,3), activation=<span class="c-str">"relu"</span>, 
                     input_shape=input_shape) %>%
    <span class="c-fn">layer_max_pooling_2d</span>(pool_size=<span class="c-str">c</span>(2,2)) %>%
    <span class="c-fn">layer_conv_2d</span>(filters=64, kernel_size=<span class="c-str">c</span>(3,3), activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_max_pooling_2d</span>(pool_size=<span class="c-str">c</span>(2,2)) %>%
    <span class="c-fn">layer_flatten</span>() %>%
    <span class="c-fn">layer_dense</span>(units=128, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dropout</span>(rate=0.5) %>%
    <span class="c-fn">layer_dense</span>(units=2, activation=<span class="c-str">"softmax"</span>)
  
} <span class="c-kwd">else if</span> (model_type == <span class="c-str">"RNN"</span>) {
  <span class="c-com># Red Neuronal Recurrente (LSTM)</span>
  model <- <span class="c-fn">keras_model_sequential</span>() %>%
    <span class="c-fn">layer_lstm</span>(units=64, input_shape=input_shape, return_sequences=TRUE) %>%
    <span class="c-fn">layer_dropout</span>(rate=0.2) %>%
    <span class="c-fn">layer_lstm</span>(units=32, return_sequences=FALSE) %>%
    <span class="c-fn">layer_dropout</span>(rate=0.2) %>%
    <span class="c-fn">layer_dense</span>(units=16, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dense</span>(units=2, activation=<span class="c-str">"softmax"</span>)
  
} <span class="c-kwd">else if</span> (model_type == <span class="c-str">"Autoencoder"</span>) {
  <span class="c-com># Autoencoder para reducción de dimensionalidad</span>
  encoding_dim <- <span class="c-num">32</span>
  
  <span class="c-com># Encoder</span>
  input_layer <- <span class="c-fn">layer_input</span>(shape=<span class="c-str">c</span>(n_features))
  encoded <- input_layer %>%
    <span class="c-fn">layer_dense</span>(units=128, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dense</span>(units=64, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dense</span>(units=encoding_dim, activation=<span class="c-str">"relu"</span>)
  
  <span class="c-com># Decoder</span>
  decoded <- encoded %>%
    <span class="c-fn">layer_dense</span>(units=64, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dense</span>(units=128, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dense</span>(units=n_features, activation=<span class="c-str">"sigmoid"</span>)
  
  model <- <span class="c-fn">keras_model</span>(input_layer, decoded)
  
} <span class="c-kwd">else</span> {
  <span class="c-com># Transformer para secuencias</span>
  <span class="c-com># Nota: Implementación simplificada</span>
  model <- <span class="c-fn">keras_model_sequential</span>() %>%
    <span class="c-fn">layer_embedding</span>(input_dim=1000, output_dim=64, 
                       input_length=50) %>%
    <span class="c-fn">layer_global_average_pooling_1d</span>() %>%
    <span class="c-fn">layer_dense</span>(units=64, activation=<span class="c-str">"relu"</span>) %>%
    <span class="c-fn">layer_dense</span>(units=2, activation=<span class="c-str">"softmax"</span>)
}

<span class="c-com># Compilar modelo</span>
<span class="c-kwd">if</span> (model_type != <span class="c-str">"Autoencoder"</span>) {
  model %>% <span class="c-fn">compile</span>(
    optimizer = <span class="c-str">"adam"</span>,
    loss = <span class="c-str">"categorical_crossentropy"</span>,
    metrics = <span class="c-str">c</span>(<span class="c-str">"accuracy"</span>)
  )
} <span class="c-kwd">else</span> {
  <span class="c-com># Autoencoder usa reconstrucción</span>
  model %>% <span class="c-fn">compile</span>(
    optimizer = <span class="c-str">"adam"</span>,
    loss = <span class="c-str">"mse"</span>
  )
}

<span class="c-com># Entrenar modelo (simulación)</span>
<span class="c-fn">cat</span>(<span class="c-str">"\\n=== ENTRENAMIENTO DEL MODELO ===\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Modelo:"</span>, model_type, <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Épocas:"</span>, n_epochs, <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Tamaño de datos:"</span>, n_samples, <span class="c-str">"muestras\\n"</span>)

<span class="c-com># Simular historial de entrenamiento</span>
history <- <span class="c-fn">data.frame</span>(
  epoch = 1:n_epochs,
  train_loss = <span class="c-fn">exp</span>(-<span class="c-fn">seq</span>(0, 3, length.out=n_epochs)) + <span class="c-fn">runif</span>(n_epochs, 0, 0.1),
  train_acc = 1 - <span class="c-fn">exp</span>(-<span class="c-fn">seq</span>(0, 2, length.out=n_epochs)) + <span class="c-fn">runif</span>(n_epochs, -0.1, 0.1),
  val_loss = <span class="c-fn">exp</span>(-<span class="c-fn">seq</span>(0, 2.5, length.out=n_epochs)) + <span class="c-fn">runif</span>(n_epochs, 0, 0.15),
  val_acc = 1 - <span class="c-fn">exp</span>(-<span class="c-fn">seq</span>(0, 1.8, length.out=n_epochs)) + <span class="c-fn">runif</span>(n_epochs, -0.15, 0.1)
)

<span class="c-com># Visualizar curvas de aprendizaje</span>
history_long <- <span class="c-fn">reshape2::melt</span>(history, id.vars=<span class="c-str">"epoch"</span>)
history_long<span class="c-var">$type</span> <- <span class="c-fn">ifelse</span>(<span class="c-fn">grepl</span>(<span class="c-str">"loss"</span>, history_long<span class="c-var">$variable</span>), 
                             <span class="c-str">"Loss"</span>, <span class="c-str">"Accuracy"</span>)
history_long<span class="c-var">$dataset</span> <- <span class="c-fn">ifelse</span>(<span class="c-fn">grepl</span>(<span class="c-str">"val_"</span>, history_long<span class="c-var">$variable</span>), 
                               <span class="c-str">"Validation"</span>, <span class="c-str">"Training"</span>)

ggplot(history_long, <span class="c-fn">aes</span>(x=epoch, y=value, color=dataset, linetype=dataset)) +
  <span class="c-fn">geom_line</span>(size=1) +
  <span class="c-fn">facet_wrap</span>(~type, scales=<span class="c-str">"free_y"</span>) +
  <span class="c-fn">theme_minimal</span>() +
  <span class="c-fn">ggtitle</span>(<span class="c-str">"Curvas de Aprendizaje del Modelo"</span>,
          subtitle = <span class="c-fn">paste</span>(<span class="c-str">"Modelo:"</span>, model_type, <span class="c-str">"| Épocas:"</span>, n_epochs)) +
  <span class="c-fn">xlab</span>(<span class="c-str">"Época"</span>) +
  <span class="c-fn">ylab</span>(<span class="c-str">""</span>) +
  <span class="c-fn">scale_color_manual</span>(values=<span class="c-fn">c</span>(<span class="c-str">"Training"</span>=<span class="c-str">"steelblue"</span>, 
                                      <span class="c-str">"Validation"</span>=<span class="c-str">"red"</span>))

<span class="c-com># Evaluar modelo</span>
final_acc <- <span class="c-fn">tail</span>(history<span class="c-var">$val_acc</span>, 1)
final_loss <- <span class="c-fn">tail</span>(history<span class="c-var">$val_loss</span>, 1)

<span class="c-com># Matriz de confusión simulada</span>
conf_matrix <- <span class="c-fn">matrix</span>(
  <span class="c-fn">c</span>(<span class="c-fn">round</span>(n_samples*0.4*0.85), <span class="c-fn">round</span>(n_samples*0.4*0.15),
    <span class="c-fn">round</span>(n_samples*0.6*0.1), <span class="c-fn">round</span>(n_samples*0.6*0.9)),
  nrow=2, byrow=TRUE
)
colnames(conf_matrix) <- <span class="c-str">c</span>(<span class="c-str">"Pred_Normal"</span>, <span class="c-str">"Pred_Patol"</span>)
rownames(conf_matrix) <- <span class="c-str">c</span>(<span class="c-str">"Real_Normal"</span>, <span class="c-str">"Real_Patol"</span>)

<span class="c-fn">cat</span>(<span class="c-str">"\\n=== RESULTADOS DEL MODELO ===\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Precisión final (validation):"</span>, <span class="c-fn">round</span>(final_acc, 3), <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Pérdida final (validation):"</span>, <span class="c-fn">round</span>(final_loss, 3), <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"\\nMatriz de Confusión:\\n"</span>)
<span class="c-fn">print</span>(conf_matrix)

<span class="c-com># Calcular métricas adicionales</span>
accuracy <- <span class="c-fn">sum</span>(<span class="c-fn">diag</span>(conf_matrix)) / <span class="c-fn">sum</span>(conf_matrix)
precision <- conf_matrix[2,2] / <span class="c-fn">sum</span>(conf_matrix[,2])
recall <- conf_matrix[2,2] / <span class="c-fn">sum</span>(conf_matrix[2,])
f1_score <- 2 * precision * recall / (precision + recall)

<span class="c-fn">cat</span>(<span class="c-str">"\\n=== MÉTRICAS DE EVALUACIÓN ===\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Accuracy:"</span>, <span class="c-fn">round</span>(accuracy, 3), <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Precision:"</span>, <span class="c-fn">round</span>(precision, 3), <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"Recall:"</span>, <span class="c-fn">round</span>(recall, 3), <span class="c-str">"\\n"</span>)
<span class="c-fn">cat</span>(<span class="c-str">"F1-Score:"</span>, <span class="c-fn">round</span>(f1_score, 3), <span class="c-str">"\\n"</span>)`,
                explain: (p) => `
                    <div class="exp-highlight">
                        <b>🤖 Inteligencia Artificial en Bioinformática</b>
                        <p>Aplicación de algoritmos de aprendizaje automático y profundo a problemas biológicos.</p>
                    </div>
                    <p><b>Modelo seleccionado: ${p.model}</b></p>
                    <p><b>Aplicaciones en bioinformática:</b></p>
                    <ul>
                        <li>🎯 Predicción de estructura de proteínas (AlphaFold)</li>
                        <li>🧬 Anotación de secuencias y genes</li>
                        <li>📊 Diagnóstico basado en imágenes médicas</li>
                        <li>⚡ Descubrimiento de fármacos</li>
                        <li>🧪 Predicción de interacciones moleculares</li>
                    </ul>
                    <p><b>Arquitecturas comunes:</b></p>
                        <ul>
                        <li>🔬 CNN: Procesamiento de imágenes y secuencias (2D)</li>
                        <li>🌀 RNN/LSTM: Análisis de secuencias temporales</li>
                        <li>🎯 Autoencoder: Reducción dimensional y generación</li>
                        <li>⚡ Transformers: Procesamiento de lenguaje natural (ADN como lenguaje)</li>
                    </ul>
                    <div class="exp-note">
                        <i class="fas fa-robot"></i> <b>Consideraciones éticas:</b>
                        <p>• Transparencia en modelos de caja negra</p>
                        <p>• Sesgos en datos de entrenamiento</p>
                        <p>• Validación rigurosa en datos independientes</p>
                        <p>• Interpretabilidad de predicciones</p>
                    </div>`,
                render: (p, div) => {
                    div.innerHTML = '';
                    
                    const container = document.createElement('div');
                    container.style.cssText = `
                        width: 100%;
                        height: 100%;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        gap: 20px;
                        padding: 20px;
                    `;
                    
                    // Red neuronal animada
                    const nnCanvas = document.createElement('div');
                    nnCanvas.style.cssText = `
                        width: 600px;
                        height: 300px;
                        background: white;
                        border-radius: 10px;
                        padding: 20px;
                        position: relative;
                        animation: fadeIn 0.5s ease-out;
                    `;
                    
                    // Capas de la red neuronal
                    const layers = p.model === 'CNN' ? 4 : 
                                  p.model === 'RNN' ? 3 : 
                                  p.model === 'Autoencoder' ? 5 : 3;
                    
                    const layerNames = {
                        'CNN': ['Input', 'Conv 32', 'Conv 64', 'Dense', 'Output'],
                        'RNN': ['Input', 'LSTM 64', 'LSTM 32', 'Output'],
                        'Autoencoder': ['Input', 'Enc 128', 'Enc 64', 'Bottleneck 32', 'Dec 64', 'Dec 128', 'Output'],
                        'Transformers': ['Input', 'Embedding', 'Attention', 'Output']
                    };
                    
                    const currentLayers = layerNames[p.model];
                    
                    currentLayers.forEach((layerName, layerIdx) => {
                        const x = 50 + (layerIdx / (currentLayers.length - 1)) * 500;
                        const nNeurons = p.model === 'CNN' ? 
                            layerIdx === 0 ? 32 : 
                            layerIdx === 1 ? 16 : 
                            layerIdx === 2 ? 8 : 4 :
                            p.model === 'RNN' ? 
                            layerIdx === 0 ? 8 : 
                            layerIdx === 1 ? 6 : 4 :
                            p.model === 'Autoencoder' ?
                            [8, 6, 4, 2, 4, 6, 8][layerIdx] : 6;
                        
                        // Neurons in this layer
                        for(let i = 0; i < nNeurons; i++) {
                            const neuron = document.createElement('div');
                            const y = 50 + (i / (nNeurons - 1)) * 200;
                            
                            neuron.style.cssText = `
                                position: absolute;
                                left: ${x}px;
                                top: ${y}px;
                                width: 20px;
                                height: 20px;
                                background: #2196F3;
                                border-radius: 50%;
                                transform: translate(-50%, -50%);
                                animation: neuronPulse 2s infinite ${i * 0.1}s;
                                z-index: 2;
                            `;
                            
                            nnCanvas.appendChild(neuron);
                        }
                        
                        // Layer label
                        const label = document.createElement('div');
                        label.style.cssText = `
                            position: absolute;
                            left: ${x}px;
                            top: 250px;
                            transform: translateX(-50%);
                            font-size: 0.7rem;
                            text-align: center;
                            color: #666;
                        `;
                        label.textContent = layerName;
                        nnCanvas.appendChild(label);
                    });
                    
                    // Conexiones entre neuronas (simplificado)
                    for(let i = 0; i < 20; i++) {
                        const line = document.createElement('div');
                        const x1 = 50 + Math.random() * 200;
                        const x2 = 350 + Math.random() * 200;
                        const y1 = 50 + Math.random() * 200;
                        const y2 = 50 + Math.random() * 200;
                        
                        line.style.cssText = `
                            position: absolute;
                            left: ${x1}px;
                            top: ${y1}px;
                            width: 0;
                            height: 1px;
                            background: #90CAF9;
                            transform-origin: 0 0;
                            animation: lineDraw 1s ease-out ${i * 0.05}s forwards;
                        `;
                        
                        const dx = x2 - x1;
                        const dy = y2 - y1;
                        const length = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                        
                        line.style.transform = `rotate(${angle}deg)`;
                        line.style.setProperty('--line-length', length + 'px');
                        
                        nnCanvas.appendChild(line);
                    }
                    
                    container.appendChild(nnCanvas);
                    
                    // Curvas de aprendizaje animadas
                    const learningCurves = document.createElement('div');
                    learningCurves.style.cssText = `
                        width: 80%;
                        height: 200px;
                        background: white;
                        border-radius: 10px;
                        padding: 20px;
                        position: relative;
                        animation: fadeIn 0.5s ease-out 0.5s forwards;
                        opacity: 0;
                    `;
                    
                    // Generar curvas de aprendizaje
                    const epochs = p.epochs;
                    const trainLoss = [];
                    const valLoss = [];
                    const trainAcc = [];
                    const valAcc = [];
                    
                    for(let i = 0; i < epochs; i++) {
                        trainLoss.push(Math.exp(-i/20) + Math.random() * 0.1);
                        valLoss.push(Math.exp(-i/25) + Math.random() * 0.15);
                        trainAcc.push(1 - Math.exp(-i/15) + Math.random() * 0.1);
                        valAcc.push(1 - Math.exp(-i/18) + Math.random() * 0.08);
                    }
                    
                    learningCurves.innerHTML = `
                        <div style="text-align: center; font-weight: bold; color: #333; margin-bottom: 15px;">
                            Curvas de Aprendizaje - ${p.model}
                        </div>
                        <div style="display: flex; height: 150px;">
                            <div style="flex: 1; position: relative; border-right: 1px solid #eee; padding-right: 10px;">
                                <div style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Pérdida (Loss)</div>
                                <div style="position: relative; height: 120px;">
                                    <div id="trainLossCurve" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
                                    <div id="valLossCurve" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
                                </div>
                            </div>
                            <div style="flex: 1; position: relative; padding-left: 10px;">
                                <div style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Precisión (Accuracy)</div>
                                <div style="position: relative; height: 120px;">
                                    <div id="trainAccCurve" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
                                    <div id="valAccCurve" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
                                </div>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 0.7rem;">
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <div style="width: 12px; height: 2px; background: #2196F3;"></div>
                                <span>Entrenamiento</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <div style="width: 12px; height: 2px; background: #f44336;"></div>
                                <span>Validación</span>
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(learningCurves);
                    
                    // Dibujar curvas después de un delay
                    setTimeout(() => {
                        const drawCurve = (data, color, id, isAcc) => {
                            const canvas = document.getElementById(id);
                            const svgNS = "http://www.w3.org/2000/svg";
                            const svg = document.createElementNS(svgNS, "svg");
                            svg.setAttribute("width", "100%");
                            svg.setAttribute("height", "100%");
                            
                            const path = document.createElementNS(svgNS, "path");
                            let d = "M 0 " + (isAcc ? 100 - (data[0] * 100) : data[0] * 100);
                            
                            for(let i = 1; i < data.length; i++) {
                                const x = (i / (data.length - 1)) * 100;
                                const y = isAcc ? 100 - (data[i] * 100) : data[i] * 100;
                                d += ` L ${x} ${y}`;
                            }
                            
                            path.setAttribute("d", d);
                            path.setAttribute("fill", "none");
                            path.setAttribute("stroke", color);
                            path.setAttribute("stroke-width", "2");
                            path.style.animation = `lineDraw 2s ease-out forwards`;
                            
                            svg.appendChild(path);
                            canvas.appendChild(svg);
                        };
                        
                        drawCurve(trainLoss, '#2196F3', 'trainLossCurve', false);
                        drawCurve(valLoss, '#f44336', 'valLossCurve', false);
                        drawCurve(trainAcc, '#2196F3', 'trainAccCurve', true);
                        drawCurve(valAcc, '#f44336', 'valAccCurve', true);
                    }, 600);
                    
                    // Métricas de rendimiento
                    const metricsContainer = document.createElement('div');
                    metricsContainer.style.cssText = `
                        width: 80%;
                        display: grid;
                        grid-template-columns: repeat(4, 1fr);
                        gap: 10px;
                        animation: fadeIn 0.5s ease-out 1s forwards;
                        opacity: 0;
                    `;
                    
                    const metrics = [
                        {label: 'Accuracy', value: (valAcc[valAcc.length-1] * 100).toFixed(1) + '%', color: '#4CAF50'},
                        {label: 'Precision', value: (Math.random() * 20 + 80).toFixed(1) + '%', color: '#2196F3'},
                        {label: 'Recall', value: (Math.random() * 20 + 75).toFixed(1) + '%', color: '#FF9800'},
                        {label: 'F1-Score', value: (Math.random() * 15 + 80).toFixed(1) + '%', color: '#9C27B0'}
                    ];
                    
                    metrics.forEach((metric, idx) => {
                        const metricCard = document.createElement('div');
                        metricCard.style.cssText = `
                            background: white;
                            border-radius: 8px;
                            padding: 15px;
                            text-align: center;
                            animation: slideInRight 0.5s ease-out ${1 + idx * 0.2}s forwards;
                            opacity: 0;
                            border-top: 4px solid ${metric.color};
                        `;
                        
                        metricCard.innerHTML = `
                            <div style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">${metric.label}</div>
                            <div style="font-size: 1.2rem; font-weight: bold; color: ${metric.color};">${metric.value}</div>
                        `;
                        
                        metricsContainer.appendChild(metricCard);
                    });
                    
                    container.appendChild(metricsContainer);
                    
                    // Matriz de confusión animada
                    const confusionMatrix = document.createElement('div');
                    confusionMatrix.style.cssText = `
                        width: 300px;
                        height: 150px;
                        background: white;
                        border-radius: 10px;
                        padding: 15px;
                        margin-top: 20px;
                        animation: fadeIn 0.5s ease-out 1.5s forwards;
                        opacity: 0;
                    `;
                    
                    confusionMatrix.innerHTML = `
                        <div style="text-align: center; font-weight: bold; color: #333; margin-bottom: 10px;">
                            Matriz de Confusión
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; text-align: center;">
                            <div></div>
                            <div style="font-size: 0.7rem; color: #666;">Predicho</div>
                            <div></div>
                            <div style="font-size: 0.7rem; color: #666; writing-mode: vertical-lr; transform: rotate(180deg);">Real</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2px;">
                                <div style="background: #C8E6C9; padding: 10px; border-radius: 3px; animation: fadeIn 0.5s ease-out 1.6s forwards; opacity: 0;">
                                    <div style="font-weight: bold;">85</div>
                                    <div style="font-size: 0.6rem;">TN</div>
                                </div>
                                <div style="background: #FFCDD2; padding: 10px; border-radius: 3px; animation: fadeIn 0.5s ease-out 1.7s forwards; opacity: 0;">
                                    <div style="font-weight: bold;">15</div>
                                    <div style="font-size: 0.6rem;">FP</div>
                                </div>
                                <div style="background: #FFCDD2; padding: 10px; border-radius: 3px; animation: fadeIn 0.5s ease-out 1.8s forwards; opacity: 0;">
                                    <div style="font-weight: bold;">10</div>
                                    <div style="font-size: 0.6rem;">FN</div>
                                </div>
                                <div style="background: #C8E6C9; padding: 10px; border-radius: 3px; animation: fadeIn 0.5s ease-out 1.9s forwards; opacity: 0;">
                                    <div style="font-weight: bold;">90</div>
                                    <div style="font-size: 0.6rem;">TP</div>
                                </div>
                            </div>
                            <div></div>
                            <div style="font-size: 0.7rem; color: #666;">Normal</div>
                            <div style="font-size: 0.7rem; color: #666;">Patológico</div>
                        </div>
                    `;
                    
                    container.appendChild(confusionMatrix);
                    
                    div.appendChild(container);
                    
                    setTimeout(() => {
                        document.getElementById('continueBtn').style.display = 'block';
                    }, 3000);
                }
            }
        ];

        // --- FUNCIONES DEL SIMULADOR (se mantienen igual) ---
        let currentLesson = 0;
        const params = {};

        function init() {
            renderMenu();
            loadLesson(0);
            
            document.getElementById('continueBtn').addEventListener('click', () => {
                if(currentLesson < lessons.length - 1) {
                    loadLesson(currentLesson + 1);
                } else {
                    alert('¡Has completado todos los temas! 🎉');
                }
            });
        }

        function renderMenu() {
            const menu = document.getElementById('menuList');
            menu.innerHTML = '';
            
            lessons.forEach((lesson, idx) => {
                const item = document.createElement('a');
                item.className = `menu-item ${idx === currentLesson ? 'active' : ''}`;
                item.href = '#';
                item.onclick = (e) => {
                    e.preventDefault();
                    loadLesson(idx);
                };
                
                item.innerHTML = `
                    <div class="menu-icon">
                        <i class="fas ${lesson.icon}"></i>
                    </div>
                    <div class="menu-text">
                        <h4>${lesson.title}</h4>
                        <p>${lesson.desc}</p>
                    </div>
                `;
                
                menu.appendChild(item);
            });
            
            // Actualizar barra de progreso
            const progress = ((currentLesson + 1) / lessons.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }

        function loadLesson(idx) {
            currentLesson = idx;
            const lesson = lessons[idx];
            
            // Actualizar menú
            renderMenu();
            
            // Cargar controles
            renderControls(lesson.controls);
            
            // Cargar código
            updateCode(lesson.code(params));
            
            // Cargar explicación
            updateExplanation(lesson.explain(params));
            
            // Renderizar visualización
            lesson.render(params, document.getElementById('plotContent'));
            
            // Ocultar botón continuar inicialmente
            document.getElementById('continueBtn').style.display = 'none';
        }

        function renderControls(controls) {
            const controlsDiv = document.getElementById('controlsArea');
            controlsDiv.innerHTML = '';
            
            controls.forEach(control => {
                const group = document.createElement('div');
                group.className = 'control-group';
                
                const label = document.createElement('span');
                label.className = 'control-label';
                label.textContent = control.label;
                
                group.appendChild(label);
                
                if(control.type === 'select') {
                    const select = document.createElement('select');
                    select.id = `ctrl-${control.id}`;
                    
                    control.options.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option;
                        opt.textContent = option;
                        if(option === (params[control.id] || control.options[0])) {
                            opt.selected = true;
                        }
                        select.appendChild(opt);
                    });
                    
                    // CORRECCIÓN: Evento simple para selects
                    select.onchange = (e) => {
                        params[control.id] = e.target.value;
                        updateLesson();
                    };
                    
                    group.appendChild(select);
                    
                } else if(control.type === 'range') {
                    const range = document.createElement('input');
                    range.type = 'range';
                    range.id = `ctrl-${control.id}`;
                    range.min = control.min;
                    range.max = control.max;
                    // CORRECCIÓN: Asegurar que step permita decimales
                    range.step = control.step || 1; 
                    range.value = params[control.id] || control.val;
                    
                    const value = document.createElement('span');
                    value.className = 'control-value';
                    value.textContent = range.value;
                    value.style.minWidth = '30px'; 
                    value.style.textAlign = 'right';
                    
                    // CORRECCIÓN CRÍTICA:
                    // 'oninput': Solo actualiza el numerito visualmente (rápido, sin lag)
                    range.oninput = (e) => {
                        value.textContent = e.target.value;
                    };

                    // 'onchange': Solo recalcula el gráfico pesado cuando SUELTAS el clic
                    range.onchange = (e) => {
                        // Importante: parseFloat para que "1.5" sea un número y no texto
                        params[control.id] = parseFloat(e.target.value);
                        updateLesson();
                    };
                    
                    group.appendChild(range);
                    group.appendChild(value);
                }
                
                controlsDiv.appendChild(group);
                
                // Inicializar parámetros si no existen
                if(params[control.id] === undefined) {
                    params[control.id] = control.val !== undefined ? control.val : control.options[0];
                }
            });
        }

        function updateCode(code) {
            const editor = document.getElementById('codeEditor');
            editor.innerHTML = code;
        }

        function updateExplanation(html) {
            const explanation = document.getElementById('explanationText');
            explanation.innerHTML = html;
        }

        function updateLesson() {
            const lesson = lessons[currentLesson];
            updateCode(lesson.code(params));
            updateExplanation(lesson.explain(params));
            lesson.render(params, document.getElementById('plotContent'));
        }

        function showTooltip(e, event) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = e.target.dataset.tooltip;
            tooltip.style.left = event.clientX + 10 + 'px';
            tooltip.style.top = event.clientY + 10 + 'px';
            tooltip.style.opacity = '1';
        }

        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.opacity = '0';
        }

        // Inicializar simulador
        init();
    </script>

</body>
</html>
