<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA | Análisis</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .pdf-page { padding: 20mm; width: 210mm; background: white; color: black; font-family: 'Inter', sans-serif; }
        section { page-break-inside: avoid; margin-bottom: 20px; }
        .editable { outline: none; border-bottom: 1px dashed #ccc; min-height: 20px; }
        .editable:focus { border-bottom: 1px solid #1f6feb; background: #f9f9f9; }
        
        /* Interactive Gene Pills */
        .gene-pill {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; background: #1a3a6b22; color: #58a6ff;
            border: 1px solid #1a3a6b55; border-radius: 12px;
            font-size: 12px; cursor: pointer; transition: all 0.15s;
            position: relative; margin: 2px;
        }
        .gene-pill:hover { background: #1a3a6b44; transform: translateY(-1px); }
        .gene-pill--enriched { border-color: #0f5e3a55; background: #0f5e3a22; color: #56d364; }
        .pill-dot { width: 5px; height: 5px; background: #56d364; border-radius: 50%; display: inline-block; }

        /* Gene Detail Sidebar */
        #gene-detail-panel {
            position: fixed; right: 0; top: 0; height: 100vh; width: 320px;
            background: #1e1e1e; border-left: 1px solid #333; z-index: 2000;
            overflow-y: auto; padding: 20px; font-family: 'Inter', sans-serif;
            transform: translateX(100%); transition: transform 0.25s ease;
            color: #d4d4d4; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="vs-code-theme">
    <div id="loading-overlay" class="loader-overlay hidden"><div class="spinner"></div><div class="loading-text">PROCESANDO...</div></div>

    <div id="gene-detail-panel"></div>

    <aside class="sidebar">

        <div class="logo-container"><div class="logo">SISTEMA</div></div>
        <nav class="nav-menu">
            <div id="menu-dashboard" class="nav-item active" onclick="switchTab('dashboard')"><i class="fas fa-columns"></i> Dashboard</div>
            <div id="menu-report" class="nav-item" onclick="switchTab('report')"><i class="fas fa-file-alt"></i> Reporte</div>
        </nav>
        <div style="padding: 10px 20px; border-top: 1px solid var(--border);">
            <button onclick="updateLocalDB()" class="btn-primary" style="width:100%; background: #2e7d32;"><i class="fas fa-sync"></i> Actualizar Datos</button>
        </div>
        <div style="padding: 10px 20px;">
            <button onclick="openEditor()" class="btn-primary" style="width:100%; background: #1565c0; margin-bottom:5px;"><i class="fas fa-edit"></i> Abrir Editor</button>
            <button onclick="exportToPDF()" class="btn-export" style="width:100%; margin-bottom:5px;"><i class="fas fa-file-pdf"></i> Guardar PDF</button>
            <button onclick="exportToMarkdown()" class="btn-export" style="width:100%; background: #333;"><i class="fab fa-markdown"></i> Guardar MD</button>
        </div>
    </aside>

    <main class="content">
        <header class="top-bar"><h1 id="view-title">Dashboard</h1></header>

        <!-- DASHBOARD -->
        <section id="dashboard-view" class="dashboard-grid">
            <div class="card full-width">
                <div class="card-body">
                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 2;">
                            <label style="font-size: 0.8rem;">Lista de miRNAs (separados por coma)</label>
                            <textarea id="mirna-input" style="width:100%; height:60px; margin-top:5px;">hsa-miR-33a-5p, hsa-miR-144-3p, hsa-miR-758-3p, hsa-miR-106b-5p, hsa-miR-33b-5p</textarea>
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem;">Modo Consenso</label>
                            <select id="consensus-mode" style="width:100%; height:60px; margin-top:5px; background: #2d2d2d; color: white; border: 1px solid #444; padding: 5px;">
                                <option value="strict">Estricto (Todos)</option>
                                <option value="4of5">Alto (≥4 de 5)</option>
                                <option value="3of5">Moderado (≥3 de 5)</option>
                                <option value="2of5">Amplio (≥2 de 5)</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="analyzePro()" class="btn-primary" style="margin-top:10px;">ANÁLISIS GENÓMICO</button>
                </div>
            </div>
            <div class="card full-width"><div id="process-logs" class="terminal-logs" style="height:100px; overflow-y:auto;"></div></div>
            <div class="card"><div id="venn-container" class="viz-container"></div></div>
            <div class="card"><div id="volcano-container" class="viz-container"></div></div>
            <div class="card full-width"><div id="ppi-container" class="viz-container"></div></div>
            <div class="card full-width"><div id="enrich-container" class="card-body"></div></div>
            <div class="card full-width"><div id="core-genes-list" class="card-body"></div></div>
        </section>

        <!-- REPORTE -->
        <section id="report-view" style="display:none; background: #eee; padding: 40px 0;">
            <div id="clinical-report-template" style="width: 210mm; margin: 0 auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
                <div class="pdf-page">
                    <div style="border-bottom: 2px solid #333; margin-bottom: 20px; display: flex; justify-content: space-between;">
                        <h2>REPORTE CIENTÍFICO</h2>
                        <div style="text-align: right; font-size: 0.8rem;">
                            <p>ID: <span id="rep-id">---</span></p>
                            <p>Fecha: <span id="rep-date">---</span></p>
                        </div>
                    </div>
                    
                    <section>
                        <h3>I. RESUMEN</h3>
                        <div id="rep-expert-summary" class="editable" contenteditable="true"></div>
                    </section>

                    <section>
                        <h3>II. DATOS DE ENTRADA</h3>
                        <div id="rep-overview" class="editable" contenteditable="true"></div>
                    </section>

                    <section>
                        <h3>III. PANEL DE GENES</h3>
                        <div id="rep-biomarker-table-container" class="editable" contenteditable="true"></div>
                    </section>

                    <section>
                        <h3>IV. DETALLE FUNCIONAL</h3>
                        <div id="rep-pathological-translation" class="editable" contenteditable="true"></div>
                    </section>

                    <section>
                        <h3>V. EVIDENCIA</h3>
                        <div id="rep-venn" style="text-align:center;"></div>
                        <div id="rep-volcano" style="text-align:center;"></div>
                        <div id="rep-ppi" style="text-align:center;"></div>
                    </section>

                    <section>
                        <h3>VI. BIBLIOGRAFÍA</h3>
                        <div id="rep-bibliography" class="editable" contenteditable="true" style="font-size:0.7rem;"></div>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
